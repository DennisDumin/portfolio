<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title description">
  <title id="title">Videoflix backend project</title>
  <desc id="description">Abstract video streaming pipeline from upload through queue processing to HLS playback.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#4c1023"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3dcfb6"/>
      <stop offset="1" stop-color="#ff4869"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="34" fill="url(#background)"/>
  <circle cx="690" cy="80" r="170" fill="#ff4869" opacity=".08"/>
  <text x="58" y="82" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="700">VIDEOFLIX</text>
  <rect x="58" y="105" width="152" height="34" rx="17" fill="#3dcfb6" opacity=".16" stroke="#3dcfb6"/>
  <text x="78" y="128" fill="#7ff7e2" font-family="Arial, sans-serif" font-size="16" font-weight="700">BACKEND · API</text>
  <circle cx="400" cy="257" r="88" fill="#ffffff" opacity=".08" stroke="url(#accent)" stroke-width="4"/>
  <path d="M378 211 458 257 378 303Z" fill="#ff4869"/>
  <path d="M118 386H682" stroke="#ffffff" stroke-opacity=".22" stroke-width="3"/>
  <g font-family="Arial, sans-serif" font-size="17" text-anchor="middle">
    <circle cx="145" cy="386" r="14" fill="#3dcfb6"/><text x="145" y="429" fill="#ffffff">Upload</text>
    <circle cx="315" cy="386" r="14" fill="#3dcfb6"/><text x="315" y="429" fill="#ffffff">Redis Queue</text>
    <circle cx="485" cy="386" r="14" fill="#ff4869"/><text x="485" y="429" fill="#ffffff">ffmpeg</text>
    <circle cx="655" cy="386" r="14" fill="#ff4869"/><text x="655" y="429" fill="#ffffff">HLS Stream</text>
  </g>
</svg>
