<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title description">
  <title id="title">KanMind backend project</title>
  <desc id="description">Abstract Kanban board API with columns, tasks and role-based permissions.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#101c1a"/>
      <stop offset="1" stop-color="#173c32"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="34" fill="url(#background)"/>
  <circle cx="700" cy="65" r="165" fill="#3dcfb6" opacity=".08"/>
  <text x="58" y="82" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="700">KANMIND</text>
  <rect x="58" y="105" width="152" height="34" rx="17" fill="#3dcfb6" opacity=".16" stroke="#3dcfb6"/>
  <text x="78" y="128" fill="#7ff7e2" font-family="Arial, sans-serif" font-size="16" font-weight="700">BACKEND · API</text>
  <g transform="translate(94 185)">
    <g fill="#ffffff" fill-opacity=".06" stroke="#3dcfb6" stroke-opacity=".55">
      <rect width="180" height="220" rx="18"/><rect x="210" width="180" height="220" rx="18"/><rect x="420" width="180" height="220" rx="18"/>
    </g>
    <g fill="#ffffff" fill-opacity=".14">
      <rect x="20" y="58" width="140" height="42" rx="10"/><rect x="20" y="118" width="140" height="66" rx="10"/>
      <rect x="230" y="58" width="140" height="70" rx="10"/><rect x="230" y="146" width="140" height="38" rx="10"/>
      <rect x="440" y="58" width="140" height="52" rx="10"/><rect x="440" y="128" width="140" height="56" rx="10"/>
    </g>
    <g fill="#7ff7e2" font-family="Arial, sans-serif" font-size="16" font-weight="700">
      <text x="20" y="34">TO DO</text><text x="230" y="34">IN PROGRESS</text><text x="440" y="34">DONE</text>
    </g>
  </g>
</svg>
