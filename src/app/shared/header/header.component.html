<div class="section-container">
  <div class="background-element">
  </div>
  <div class="content-wrapper">
    <div class="section">
      @if(isDesktopView) {
        <div class="header-desktop">
          <div class="language">
            <button 
              [ngClass]="{ chosen: !isGermanActive }" 
              (click)="switchLanguage(Language.ENGLISH)">
              EN
            </button>
            <button 
              [ngClass]="{ chosen: isGermanActive }" 
              (click)="switchLanguage(Language.GERMAN)">
              DE
            </button>
          </div>
          
          @for (item of navigationItems; track $index; let i = $index) {
            <div class="header-item">
              <button
                type="button"
                class="navigation-button"
                (mouseenter)="setNavItemActive(i)" 
                (mouseleave)="clearActiveNavItem()" 
                (click)="navigateToSection(item.anchor)">
                  {{ item.translationKey | translate }}
              </button>
              @if(activeNavItemIndex === i) {
                <div class="hover-indicator">
                  <img src="assets/img/icons/hover_point.svg" alt="indicator">
                </div>
              }
            </div>
          }
        </div>
        
        <button type="button" (click)="navigateToHome()" class="logo" [attr.aria-label]="'header.home' | translate">
          <img 
            (mouseenter)="setLogoHovered(true)" 
            (mouseleave)="setLogoHovered(false)" 
            [src]="isLogoHovered ? 'assets/img/logo/logo_white_hover.png' : 'assets/img/logo/logo_white.png'" 
            alt="Logo" />
        </button>
      } @else {
        <button type="button" (click)="navigateToHome()" class="logo" [attr.aria-label]="'header.home' | translate">
          <img 
            (mouseenter)="setLogoHovered(true)" 
            (mouseleave)="setLogoHovered(false)" 
            [src]="isLogoHovered ? 'assets/img/logo/logo_white_hover.svg' : 'assets/img/logo/logo_white.svg'" 
            alt="Logo" />
        </button>
        
        <div class="mobile-menu-container">
          <button
            type="button"
            class="menu-button"
            [attr.aria-expanded]="isMobileMenuOpen"
            aria-controls="mobile-navigation"
            [attr.aria-label]="'header.menu' | translate"
            (click)="toggleMobileMenu()">
            <img
              class="menu-icon"
              [src]="!isMobileMenuOpen ? 'assets/img/header/burger_icon.svg' : 'assets/img/header/burger_icon_green.svg'"
              alt="" />
          </button>
            
          @if(isMobileMenuOpen) {
            <div class="header-mobile" id="mobile-navigation">
              <div class="mobile-header-content">
                @for (item of navigationItems; track $index; let i = $index) {
                  <div class="header-item">
                    <button
                      type="button"
                      class="navigation-button"
                      (mouseenter)="setNavItemActive(i)" 
                      (mouseleave)="clearActiveNavItem()" 
                      (click)="navigateToSection(item.anchor)">
                        {{ item.translationKey | translate }}
                    </button>
                    @if(activeNavItemIndex === i) {
                      <div class="hover-indicator mobile">
                        <img src="assets/img/icons/hover_point.svg" alt="indicator">
                      </div>
                    }
                  </div>
                }
          
                <div class="language language-mobile">
                  <button 
                    [ngClass]="{ chosen: !isGermanActive }" 
                    (click)="switchLanguage(Language.ENGLISH)">
                    EN
                  </button>
                  <button 
                    [ngClass]="{ chosen: isGermanActive }" 
                    (click)="switchLanguage(Language.GERMAN)">
                    DE
                  </button>
                </div>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
